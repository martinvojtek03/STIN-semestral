name: .NET Core CI

on:
  push:
    branches: 
      - main
      - Develop
      - 'feat/**'
  pull_request:
    branches: 
      - main
      - Develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test with Coverage
      # KLÍÈOVÁ ZM̀NA: Pøidány filtry Exclude pro vynechání netestovatelnưch souborù
      run: >
        dotnet test --no-build --verbosity normal 
        /p:CollectCoverage=true 
        /p:CoverletOutputFormat=cobertura 
        /p:Exclude="[Stin-Semestral]Program%2c[*]*GeneratedDocument*%2c[*]Stin_Semestral.Migrations.*%2c[*]Stin_Semestral.Data.*" 
        --collect:"XPlat Code Coverage"
      
    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Report
      run: |
        reportgenerator -reports:"**/TestResults/**/coverage.cobertura.xml" -targetdir:"coveragereport" -reporttypes:"MarkdownSummary;HtmlInline_AzurePipelines"

    - name: Upload coverage summary
      run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

    - name: Check Coverage Threshold
      shell: pwsh
      run: |
        $summary = Get-Content "coveragereport/Summary.md" -Raw
        if ($summary -match 'Line coverage: (\d+\.?\d*)%') {
            $percent = [double]$matches[1]
            Write-Host "Current Code Coverage (Filtered): $percent%"
            if ($percent -lt 80) {
                Write-Error "Code coverage is below 80%! Build failed."
                exit 1
            }
        } else {
            Write-Error "Could not find coverage data in summary."
            exit 1
        }