name: .NET Core CI

on:
  push:
    branches: [ main, Develop, 'feat/**' ]
  pull_request:
    branches: [ main, Develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -p:TreatWarningsAsErrors=false -p:WarningLevel=0

    - name: Test with Coverage
      run: >
        dotnet test --no-build --verbosity normal 
        --collect:"XPlat Code Coverage" 
        --results-directory ./TestResults
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[Stin-Semestral]Program,[*]Stin_Semestral.Migrations.*,[*]Stin_Semestral.Data.*,[*]AspNetCoreGeneratedDocument.*,[*]Stin_Semestral.View.*,[*]Stin_Semestral.Views.*"
   
    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Report
      if: always()
      run: |
        reportgenerator -reports:"./TestResults/**/*.xml" -targetdir:"coveragereport" -reporttypes:"MarkdownSummary;HtmlInline_AzurePipelines"

    - name: Upload coverage summary
      if: always()
      run: |
        if [ -f coveragereport/Summary.md ]; then
          cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ Error: Coverage data not found. Build or Tests failed too early." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Check Coverage Threshold
      if: always()
      shell: pwsh
      run: |
        if (Test-Path "coveragereport/Summary.md") {
            $summary = Get-Content "coveragereport/Summary.md" -Raw
            if ($summary -match 'Branch coverage: (\d+\.?\d*)%') {
                $percent = [double]$matches[1]
                Write-Host "Current Branch Coverage: $percent%"
                if ($percent -lt 80) {
                    Write-Error "Branch coverage is below 80%! Current: $percent%"
                    exit 1
                }
            }
        }

    # --- NASAZENÍ (DEPLOYMENT) ---
    # Tento krok se spustí jen při pushi do větve main a pokud testy prošly
    
    - name: Publish Application
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
      # Opraveno: Cílíme přímo na projektový soubor, aby nedošlo ke konfliktu v solution
      run: dotnet publish ./Stin-Semestral.csproj -c Release -o ./publish_folder

    - name: Inject Secrets into appsettings.json
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
      shell: pwsh
      run: |
        $path = "./publish_folder/appsettings.json"
        if (Test-Path $path) {
            $json = Get-Content $path -Raw | ConvertFrom-Json
            
            # 1. Oprava pro ApiKey (sekce s mezerou " ")
            if (-not $json." ") { $json | Add-Member -Type NoteProperty -Name " " -Value (New-Object PSObject) }
            $json." ".ApiKey = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
            
            # 2. Oprava pro AdminSettings (sekce AdminSettings)
            if (-not $json.AdminSettings) { $json | Add-Member -Type NoteProperty -Name "AdminSettings" -Value (New-Object PSObject) }
            $json.AdminSettings.PasswordHash = "${{ secrets.ADMINSETTINGS }}"
            
            # Uložení zpět s hloubkou (pro vnořené objekty)
            $json | ConvertTo-Json -Depth 10 | Set-Content $path -Encoding UTF8
            Write-Host "Všechny secrety (API i Hash) byly úspěšně vloženy do appsettings.json."
        }

    - name: 🚀 Deploy to MonsterASP via FTP
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_folder/
        server-dir: /wwwroot/
        protocol: ftp