name: .NET Core CI

on:
  push:
    branches: [ main, Develop, 'feat/**' ]
  pull_request:
    branches: [ main, Develop ]

env:
  # Umlčí varování o zastarávání Node.js 20 v GitHub runneru
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      # Klíčová změna: -p:TreatWarningsAsErrors=false zajistí, že varování o "Name" v modelech nezastaví CI
      run: dotnet build --no-restore -p:TreatWarningsAsErrors=false

    - name: Test with Coverage
      # Používáme pevný adresář ./TestResults, aby ReportGenerator věděl, kam jít
      run: >
        dotnet test --no-build --verbosity normal 
        --collect:"XPlat Code Coverage" 
        --results-directory ./TestResults
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[Stin-Semestral]Program,[*]AspNetCoreGeneratedDocument.*,[*]Stin_Semestral.Migrations.*,[*]Stin_Semestral.Data.*,[*]Stin_Semestral.View.*,[*]Stin_Semestral.Views.*"

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Report
      # Prohledá složku ./TestResults pro vygenerované .xml soubory s coverage
      run: |
        reportgenerator -reports:"./TestResults/**/*.xml" -targetdir:"coveragereport" -reporttypes:"MarkdownSummary;HtmlInline_AzurePipelines"

    - name: Upload coverage summary
      # Zapíše výsledek do GitHub Summary (uvidíš ho v přehledu buildu)
      run: |
        if [ -f coveragereport/Summary.md ]; then
          cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ Error: Data o pokrytí nebyla nalezena!" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Check Coverage Threshold
      shell: pwsh
      run: |
        if (Test-Path "coveragereport/Summary.md") {
            $summary = Get-Content "coveragereport/Summary.md" -Raw
            # Najde procenta u Branch coverage (pokrytí větví)
            if ($summary -match 'Branch coverage: (\d+\.?\d*)%') {
                $percent = [double]$matches[1]
                Write-Host "Aktuální Branch Coverage: $percent%"
                if ($percent -lt 80) {
                    Write-Error "Branch coverage je pod 80 %! Aktuálně: $percent%"
                    exit 1
                }
                Write-Host "✅ Coverage check prošel!"
            } else {
                Write-Error "Nepodařilo se vyparsovat procenta z reportu."
                exit 1
            }
        } else {
            Write-Error "Soubor Summary.md chybí."
            exit 1
        }