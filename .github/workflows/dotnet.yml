name: .NET Core CI

on:
  push:
    branches: [ main, Develop, 'feat/**' ]
  pull_request:
    branches: [ main, Develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      # Přidali jsme parametry pro ignorování všech chyb spojených s formátováním a nullable typy
      run: dotnet build --no-restore -p:TreatWarningsAsErrors=false -p:WarningLevel=0

    - name: Test with Coverage
      run: >
        dotnet test --no-build --verbosity normal 
        --collect:"XPlat Code Coverage" 
        --results-directory ./TestResults
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[Stin-Semestral]Program,[*]Stin_Semestral.Migrations.*,[*]Stin_Semestral.Data.*,[*]AspNetCoreGeneratedDocument.*,[*]Stin_Semestral.View.*,[*]Stin_Semestral.Views.*"
   
    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Report
      # if: always() zajistí, že se report zkusí vygenerovat, i když testy selžou
      if: always()
      run: |
        reportgenerator -reports:"./TestResults/**/*.xml" -targetdir:"coveragereport" -reporttypes:"MarkdownSummary;HtmlInline_AzurePipelines"

    - name: Upload coverage summary
      if: always()
      run: |
        if [ -f coveragereport/Summary.md ]; then
          cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ Error: Coverage data not found. Build or Tests failed too early." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Check Coverage Threshold
      if: always()
      shell: pwsh
      run: |
        if (Test-Path "coveragereport/Summary.md") {
            $summary = Get-Content "coveragereport/Summary.md" -Raw
            if ($summary -match 'Branch coverage: (\d+\.?\d*)%') {
                $percent = [double]$matches[1]
                Write-Host "Current Branch Coverage: $percent%"
                if ($percent -lt 80) {
                    Write-Error "Branch coverage is below 80%! Current: $percent%"
                    exit 1
                }
            }
        }